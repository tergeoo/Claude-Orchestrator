name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build agent binaries ────────────────────────────────────────────────────
  build-agent:
    name: Build agent (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "claude-agent-${{ matrix.goos }}-${{ matrix.goarch }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: claude-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/claude-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Build relay binaries ────────────────────────────────────────────────────
  build-relay:
    name: Build relay (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: relay/go.sum

      - name: Build
        working-directory: relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: relay/claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Create release + update Homebrew formula ────────────────────────────────
  release:
    name: Create Release
    needs: [build-agent, build-relay]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
          body: |
            ## Claude Agent ${{ github.ref_name }}

            ### Install via Homebrew (macOS)
            ```bash
            brew tap tergeoo/claude-orchestrator https://github.com/tergeoo/Claude-Orchestrator
            brew install claude-agent
            ```

            ### Run
            ```bash
            claude-agent --relay wss://YOUR_RELAY --secret YOUR_SECRET [--name MyMac]
            ```

            ### Or use a config file
            ```bash
            claude-agent --init   # creates ~/.config/claude-agent/config.yaml
            # edit the file, then:
            claude-agent
            ```

            ### Auto-start on login
            ```bash
            brew services start claude-agent
            ```

      - name: Update Homebrew formula
        run: |
          VERSION="${{ github.ref_name }}"
          ARM64_SHA=$(sha256sum dist/claude-agent-darwin-arm64 | awk '{print $1}')
          AMD64_SHA=$(sha256sum dist/claude-agent-darwin-amd64 | awk '{print $1}')

          # Strip leading 'v' for formula version field
          VER="${VERSION#v}"

          sed -i \
            -e "s|/releases/download/v[^/]*/claude-agent-darwin-arm64|/releases/download/${VERSION}/claude-agent-darwin-arm64|g" \
            -e "s|/releases/download/v[^/]*/claude-agent-darwin-amd64|/releases/download/${VERSION}/claude-agent-darwin-amd64|g" \
            -e "/claude-agent-darwin-arm64/{n; s|sha256 \"[^\"]*\"|sha256 \"${ARM64_SHA}\"|}" \
            -e "/claude-agent-darwin-amd64/{n; s|sha256 \"[^\"]*\"|sha256 \"${AMD64_SHA}\"|}" \
            -e "s|version \"[^\"]*\"|version \"${VER}\"|g" \
            Formula/claude-agent.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-agent.rb
          git diff --staged --quiet || git commit -m "chore: update formula to ${VERSION}"
          git push
