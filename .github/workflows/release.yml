name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Build agent binaries for all platforms ──────────────────────────────────
  build-agent:
    name: Build agent (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "clrc-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clrc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/clrc-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Build relay binary ──────────────────────────────────────────────────────
  build-relay:
    name: Build relay (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: relay/go.sum

      - name: Build
        working-directory: relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: relay/claude-relay-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Create GitHub Release + update Homebrew formula ─────────────────────────
  release:
    name: Create Release
    needs: [build-agent, build-relay]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            ### Homebrew (recommended)
            ```sh
            brew tap tergeoo/clrc https://github.com/tergeoo/clrc
            brew install clrc
            brew services start clrc   # auto-start on login
            ```

            ### One-liner
            ```sh
            curl -fsSL https://raw.githubusercontent.com/tergeoo/clrc/main/install.sh | sh
            ```

            ### Usage
            ```sh
            clrc start / stop / restart / status / logs
            ```

      - name: Update Homebrew formula
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          ARM64_SHA=$(sha256sum dist/clrc-darwin-arm64 | awk '{print $1}')
          AMD64_SHA=$(sha256sum dist/clrc-darwin-amd64 | awk '{print $1}')

          sed -i \
            -e "s|version \"[^\"]*\"|version \"${VER}\"|" \
            Formula/clrc.rb
          # Replace sha256 on the line immediately after the matching url line
          sed -i \
            -e "/clrc-darwin-arm64/{n; s|sha256 \"[^\"]*\"|sha256 \"${ARM64_SHA}\"|}"\
            -e "/clrc-darwin-amd64/{n; s|sha256 \"[^\"]*\"|sha256 \"${AMD64_SHA}\"|}"\
            Formula/clrc.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clrc.rb
          git diff --staged --quiet || git commit -m "chore: update formula to ${VERSION}"
          git push

  # ── Build and push Docker image to GHCR ─────────────────────────────────────
  docker:
    name: Push Docker image
    needs: [build-agent]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clrc
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
